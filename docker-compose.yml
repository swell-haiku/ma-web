version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: debate-arena-mongo
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: debate-arena-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: debate-arena-backend
    ports:
      - '5000:5000'
    environment:
      MONGODB_URI: mongodb://root:root@mongo:27017/debate-arena
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: debate-arena-frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  mongo-data:
  redis-data:
